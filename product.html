<!DOCTYPE html>
<html class="light" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>تفاصيل المنتج - نيازي</title>
    <link rel="icon" type="image/png" href="images/Logo.png"/>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "secondary": "#5d5f5f",
                        "surface": "#fbf9f9",
                        "surface-variant": "#e4e2e2",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f3f3",
                        "on-surface": "#1b1c1c",
                        "on-surface-variant": "#4c4546",
                        "outline-variant": "#cfc4c5",
                    },
                    spacing: {
                        "xs": "0.5rem", "sm": "1rem", "md": "1.5rem", "lg": "2.5rem", "xl": "4rem", "gutter": "1.5rem", "container-max": "1280px"
                    },
                    fontFamily: {
                        "sans": ["Lexend", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Lexend', sans-serif; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: red; color: white;
            border-radius: 50%; width: 16px; height: 16px; font-size: 10px;
            display: none; align-items: center; justify-content: center;
        }
        .selected-option {
            border-color: #000 !important;
            background-color: #000 !important;
            color: #fff !important;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-24 md:pb-12 pt-28">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 w-full bg-white border-b border-surface-container-high h-24 flex items-center px-4 md:px-8 rtl">
        
        <!-- Right side (Desktop: Nav, Mobile: Logo) -->
        <div class="flex-1 flex items-center justify-start">
            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center gap-8">
                <a class="flex items-center gap-2 text-[18px] md:text-[22px] font-medium text-on-surface hover:text-primary transition-colors" href="index.html">
                    <span class="material-symbols-outlined text-[24px] md:text-[28px]">home</span>
                    <span>الرئيسية</span>
                </a>
                <a class="flex items-center gap-2 text-[18px] md:text-[22px] font-medium text-on-surface hover:text-primary transition-colors relative" href="cart.html">
                    <span class="material-symbols-outlined text-[24px] md:text-[28px]">local_mall</span>
                    <span>عربة التسوق</span>
                    <span class="cart-badge absolute -top-2 -right-3" style="z-index: 10;">0</span>
                </a>
                <a class="flex items-center gap-2 text-[18px] md:text-[22px] font-medium text-on-surface hover:text-primary transition-colors" href="contact.html">
                    <span class="material-symbols-outlined text-[24px] md:text-[28px]">headset_mic</span>
                    <span>تواصل معنا</span>
                </a>
            </nav>
            <!-- Mobile Logo -->
            <a href="index.html" class="md:hidden flex items-center">
                <img src="images/Logo.png" alt="Logo" class="h-14 w-auto object-contain"/>
            </a>
        </div>

        <!-- Center: Brand Name -->
        <a href="index.html" class="absolute left-1/2 -translate-x-1/2 flex items-center justify-center">
            <span class="text-[32px] md:text-[40px] font-bold text-primary tracking-tight whitespace-nowrap">نيازي</span>
        </a>

        <!-- Left side (Desktop: Logo, Mobile: Cart) -->
        <div class="flex-1 flex justify-end items-center">
            <!-- Desktop Logo -->
            <a href="index.html" class="hidden md:flex items-center">
                <img src="images/Logo.png" alt="Logo" class="h-16 md:h-20 w-auto object-contain"/>
            </a>
            <!-- Mobile Cart -->
            <a href="cart.html" class="md:hidden relative inline-flex text-primary hover:opacity-70 transition">
                <span class="material-symbols-outlined text-[32px]">local_mall</span>
                <span class="cart-badge absolute -top-1 -right-2" style="z-index: 10;">0</span>
            </a>
        </div>
    </header>

    <main class="flex-grow px-6 md:px-12 max-w-7xl mx-auto w-full" id="product-container">
        <div class="text-center py-20">جاري تحميل المنتج...</div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white border-t border-surface-container-high shadow-lg rtl">
        <a href="index.html" class="flex flex-col items-center gap-1 text-primary hover:opacity-70 transition">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-medium">الرئيسية</span>
        </a>
        <a href="cart.html" class="flex flex-col items-center gap-1 text-primary hover:opacity-70 transition relative">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="cart-badge">0</span>
            <span class="text-[10px] font-medium">السلة</span>
        </a>
        <a href="contact.html" class="flex flex-col items-center gap-1 text-primary hover:opacity-70 transition">
            <span class="material-symbols-outlined">chat</span>
            <span class="text-[10px] font-medium">تواصل معنا</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentProduct = null;
        let selectedSize = '';
        let selectedColor = '';

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                document.getElementById('product-container').innerHTML = '<div class="text-center text-red-500 py-20">المنتج غير موجود.</div>';
                return;
            }

            try {
                const products = await fetchProducts();
                currentProduct = products.find(p => p.id == productId);

                if (!currentProduct) {
                    document.getElementById('product-container').innerHTML = '<div class="text-center text-red-500 py-20">المنتج غير موجود.</div>';
                    return;
                }

                if (currentProduct.sizes.length > 0) selectedSize = currentProduct.sizes[0];
                if (currentProduct.colors.length > 0) selectedColor = currentProduct.colors[0];

                renderProduct();
            } catch (e) {
                document.getElementById('product-container').innerHTML = '<div class="text-center text-red-500 py-20">حدث خطأ أثناء تحميل البيانات.</div>';
            }
        }

        function renderProduct() {
            const container = document.getElementById('product-container');
            const mainImg = currentProduct.images.length > 0 ? currentProduct.images[0] : '';
            
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16">
                    <!-- Images -->
                    <div class="flex flex-col gap-4">
                        <div class="aspect-square bg-surface-container-lowest rounded-xl shadow-sm flex items-center justify-center overflow-hidden border border-surface-variant/50">
                            ${mainImg ? `<img id="mainImage" alt="${currentProduct.name}" class="w-full h-full object-cover" src="${mainImg}"/>` : `<span class="material-symbols-outlined text-gray-400 text-6xl">image</span>`}
                        </div>
                        <div class="grid grid-cols-4 gap-4">
                            ${currentProduct.images.map(img => `
                                <button onclick="setMainImage('${img}')" class="aspect-square bg-surface-container-lowest rounded-lg border border-outline-variant overflow-hidden hover:border-primary transition-all">
                                    <img alt="Thumbnail" class="w-full h-full object-cover" src="${img}"/>
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Info -->
                    <div class="flex flex-col gap-8">
                        <div>
                            <p class="text-[14px] text-on-surface-variant mb-2">${currentProduct.category}</p>
                            <h1 class="text-[32px] font-bold text-primary leading-tight">${currentProduct.name}</h1>
                            <p class="text-[28px] font-bold text-primary mt-4">${currentProduct.price} ج.م</p>
                        </div>
                        
                        ${currentProduct.description ? `<p class="text-[16px] text-on-surface-variant leading-relaxed">${currentProduct.description}</p>` : ''}

                        ${currentProduct.colors.length > 0 ? `
                        <div>
                            <p class="font-medium text-on-surface mb-3">اللون:</p>
                            <div class="flex flex-wrap gap-3" id="color-options">
                                ${currentProduct.colors.map(color => `
                                    <button onclick="selectColor('${color}')" class="px-6 py-2 rounded-full border border-outline-variant text-[14px] font-medium transition-all ${selectedColor === color ? 'selected-option' : 'hover:border-primary'}">${color}</button>
                                `).join('')}
                            </div>
                        </div>` : ''}

                        ${currentProduct.sizes.length > 0 ? `
                        <div>
                            <p class="font-medium text-on-surface mb-3">المقاس:</p>
                            <div class="flex flex-wrap gap-3" id="size-options">
                                ${currentProduct.sizes.map(size => `
                                    <button onclick="selectSize('${size}')" class="w-12 h-12 rounded-full border border-outline-variant text-[14px] font-medium flex items-center justify-center transition-all ${selectedSize === size ? 'selected-option' : 'hover:border-primary'}">${size}</button>
                                `).join('')}
                            </div>
                        </div>` : ''}

                        <div class="flex gap-4 mt-4">
                            <button onclick="handleAddToCart()" class="flex-1 flex items-center justify-center gap-2 bg-primary text-white py-4 px-6 rounded-lg font-bold text-base transition-transform active:scale-95 shadow-md hover:bg-opacity-90">
                                <span class="material-symbols-outlined text-xl">shopping_cart</span>
                                إضافة للسلة
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function setMainImage(url) {
            document.getElementById('mainImage').src = url;
        }

        function selectSize(size) {
            selectedSize = size;
            renderProduct();
        }

        function selectColor(color) {
            selectedColor = color;
            renderProduct();
        }

        function handleAddToCart() {
            if (currentProduct.sizes.length > 0 && !selectedSize) {
                alert('الرجاء اختيار المقاس');
                return;
            }
            if (currentProduct.colors.length > 0 && !selectedColor) {
                alert('الرجاء اختيار اللون');
                return;
            }
            
            addToCart(currentProduct, selectedSize, selectedColor, 1);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
