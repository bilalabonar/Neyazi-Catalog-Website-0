<!DOCTYPE html>
<html class="light" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>لبيب المختص - الرئيسية</title>
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "secondary": "#5d5f5f",
                        "surface": "#fbf9f9",
                        "surface-variant": "#e4e2e2",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f3f3",
                        "on-surface": "#1b1c1c",
                        "on-surface-variant": "#4c4546",
                        "outline-variant": "#cfc4c5",
                    },
                    spacing: {
                        "xs": "0.5rem", "sm": "1rem", "md": "1.5rem", "lg": "2.5rem", "xl": "4rem", "gutter": "1.5rem", "container-max": "1280px"
                    },
                    fontFamily: {
                        "sans": ["Lexend", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Lexend', sans-serif; }
        .ambient-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: red; color: white;
            border-radius: 50%; width: 16px; height: 16px; font-size: 10px;
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col pb-20">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 w-full bg-white border-b border-surface-container-high h-24 flex items-center px-4 md:px-8 rtl">
        
        <!-- Right side (Desktop: Nav, Mobile: Logo) -->
        <div class="flex-1 flex items-center justify-start">
            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center gap-8">
                <a class="flex items-center gap-2 text-[18px] md:text-[22px] font-medium text-on-surface hover:text-primary transition-colors" href="index.html">
                    <span class="material-symbols-outlined text-[24px] md:text-[28px]">home</span>
                    <span>الرئيسية</span>
                </a>
                <a class="flex items-center gap-2 text-[18px] md:text-[22px] font-medium text-on-surface hover:text-primary transition-colors relative" href="cart.html">
                    <span class="material-symbols-outlined text-[24px] md:text-[28px]">local_mall</span>
                    <span>عربة التسوق</span>
                    <span class="cart-badge absolute -top-2 -right-3" style="z-index: 10;">0</span>
                </a>
                <a class="flex items-center gap-2 text-[18px] md:text-[22px] font-medium text-on-surface hover:text-primary transition-colors" href="contact.html">
                    <span class="material-symbols-outlined text-[24px] md:text-[28px]">headset_mic</span>
                    <span>تواصل معنا</span>
                </a>
            </nav>
            <!-- Mobile Logo -->
            <a href="index.html" class="md:hidden flex items-center">
                <img src="images/Logo.png" alt="Logo" class="h-14 w-auto object-contain"/>
            </a>
        </div>

        <!-- Center: Brand Name -->
        <a href="index.html" class="absolute left-1/2 -translate-x-1/2 flex items-center justify-center">
            <span class="text-[32px] md:text-[40px] font-bold text-primary tracking-tight whitespace-nowrap">نيازي</span>
        </a>

        <!-- Left side (Desktop: Logo, Mobile: Cart) -->
        <div class="flex-1 flex justify-end items-center">
            <!-- Desktop Logo -->
            <a href="index.html" class="hidden md:flex items-center">
                <img src="images/Logo.png" alt="Logo" class="h-16 md:h-20 w-auto object-contain"/>
            </a>
            <!-- Mobile Cart -->
            <a href="cart.html" class="md:hidden relative inline-flex text-primary hover:opacity-70 transition">
                <span class="material-symbols-outlined text-[32px]">local_mall</span>
                <span class="cart-badge absolute -top-1 -right-2" style="z-index: 10;">0</span>
            </a>
        </div>
    </header>

    <main class="flex-1 mt-28 px-gutter md:px-lg max-w-container-max mx-auto w-full">
        <!-- Hero Section -->
        <section class="mb-xl relative w-full rounded-xl overflow-hidden ambient-shadow flex items-center justify-center bg-surface-variant h-[40vh] md:h-[50vh]">
            <img id="heroImage" alt="Hero Banner" class="absolute inset-0 w-full h-full object-cover" src=""/>
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="relative z-10 text-center text-white px-gutter flex flex-col items-center justify-center w-full h-full">
                <h1 id="heroTitle" class="text-[32px] md:text-[48px] font-bold leading-[1.2] mb-xs drop-shadow-md"></h1>
                <p id="heroSubtitle" class="text-[18px] md:text-[24px] mb-lg text-white/90 text-center max-w-[80%]"></p>
                <button onclick="document.getElementById('products-section').scrollIntoView({behavior: 'smooth'})" class="bg-white text-primary font-medium px-8 py-3 rounded-full hover:shadow-[0_10px_20px_rgba(0,0,0,0.1)] transition-shadow">تسوق الآن</button>
            </div>
        </section>

        <!-- Categories / Filters -->
        <section id="products-section" class="mb-lg w-full">
            <div class="flex flex-col gap-sm">
                <div class="flex overflow-x-auto hide-scrollbar gap-xs rtl" id="categoryContainer">
                    <!-- Categories will be rendered here -->
                </div>
            </div>
        </section>

        <!-- Product Grid -->
        <section id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-gutter mb-xl">
            <!-- Loading indicator -->
            <div class="col-span-full text-center py-10 text-secondary">جاري تحميل المنتجات...</div>
        </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white border-t border-surface-container-high shadow-lg rtl">
        <a href="index.html" class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
            <span class="text-[10px] font-medium">الرئيسية</span>
        </a>
        <a href="cart.html" class="flex flex-col items-center gap-1 text-primary hover:opacity-70 transition relative">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="cart-badge">0</span>
            <span class="text-[10px] font-medium">السلة</span>
        </a>
        <a href="contact.html" class="flex flex-col items-center gap-1 text-primary hover:opacity-70 transition">
            <span class="material-symbols-outlined">chat</span>
            <span class="text-[10px] font-medium">تواصل معنا</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let allProducts = [];
        let currentCategory = 'الكل';

        document.getElementById('heroImage').src = CONFIG.HERO_IMAGE_URL;
        document.getElementById('heroTitle').textContent = CONFIG.HERO_TITLE || 'أناقة تخطو معك';
        document.getElementById('heroSubtitle').textContent = CONFIG.HERO_SUBTITLE || 'بساطة التصميم، رقي الاختيار.';

        async function init() {
            try {
                allProducts = await fetchProducts();
                renderCategories();
                renderProducts();
            } catch (e) {
                document.getElementById('productGrid').innerHTML = '<div class="col-span-full text-center text-red-500">حدث خطأ أثناء تحميل البيانات. تأكد من إعداد رابط Google Sheet.</div>';
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            const categories = ['الكل', ...new Set(allProducts.map(p => p.category).filter(c => c))];
            
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" class="whitespace-nowrap px-md py-xs rounded-full border transition-all duration-300 font-semibold text-[14px] ${cat === currentCategory ? 'bg-primary text-white border-primary' : 'border-outline-variant text-on-surface hover:border-primary'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const filtered = currentCategory === 'الكل' 
                ? allProducts 
                : allProducts.filter(p => p.category === currentCategory);

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 text-secondary">لا توجد منتجات في هذا التصنيف.</div>';
                return;
            }

            grid.innerHTML = filtered.map(product => {
                const imgUrl = product.images.length > 0 ? product.images[0] : '';
                return `
                    <article class="flex flex-col bg-surface-container-lowest ambient-shadow rounded-lg p-sm group cursor-pointer" onclick="window.location.href='product.html?id=${product.id}'">
                        <div class="relative w-full aspect-[4/5] bg-surface-container-low mb-sm overflow-hidden rounded-md flex items-center justify-center">
                            ${imgUrl ? `<img alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${imgUrl}"/>` 
                                     : `<span class="material-symbols-outlined text-gray-400 text-4xl">image</span>`}
                        </div>
                        <h3 class="font-medium text-[16px] text-on-surface mb-1 truncate">${product.name}</h3>
                        <p class="font-bold text-[18px] text-primary mb-sm">${product.price} ج.م</p>
                        <div class="mt-auto flex gap-2">
                            <button class="flex-1 bg-primary text-white text-[14px] rounded flex items-center justify-center hover:bg-opacity-80 transition-colors py-2 whitespace-nowrap">
                                <span class="material-symbols-outlined ml-1 text-[18px]">visibility</span> عرض
                            </button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
